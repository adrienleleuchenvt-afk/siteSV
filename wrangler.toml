# Configuration Cloudflare Pages + Workers
# Déployez avec : npx wrangler pages deploy

name = "sancea-vet"
compatibility_date = "2026-05-14"
compatibility_flags = ["nodejs_compat"]

# Variables publiques (non sensibles)
[vars]
FROM_EMAIL = "refere@sanceavet.fr"
TO_EMAIL = "refere@sanceavet.fr"

# Les secrets suivants doivent être configurés via :
# npx wrangler pages secret put RESEND_API_KEY
# npx wrangler pages secret put HCATCHA_SECRET
# 
# RESEND_API_KEY = votre_clé_api_resend
# HCATCHA_SECRET = votre_clé_secrète_hcaptcha
