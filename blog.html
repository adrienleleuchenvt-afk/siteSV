<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Sancéa Vet</title>
    <meta name="description" content="Retrouvez nos articles santé, conseils vétérinaires et actualités de la clinique.">
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        /* Header compact */
        .blog-hero {
            background: linear-gradient(135deg, #2a9d8f, #264653);
            padding: 5rem 2rem 3rem;
            text-align: center;
            color: white;
        }
        .blog-hero h1 { font-size: 2.2rem; margin-bottom: 0.5rem; }
        .blog-hero p  { opacity: 0.85; margin-bottom: 1.2rem; }

        /* Modal image */
        .article-modal-img-wrapper img {
            width: 100%;
            max-height: 380px;
            object-fit: cover;
            border-radius: 16px 16px 0 0;
        }

        /* Modal scrollable */
        .modal-large {
            max-width: 760px;
            max-height: 88vh;
            overflow-y: auto;
            padding: 0;
        }
        .modal-large .modal-body {
            padding: 2rem 2.5rem 2.5rem;
        }
        .modal-large .article-body p  { margin-bottom: 1rem; }
        .modal-large .article-body ul { margin: 1rem 0 1rem 1.5rem; }
        .modal-large .article-body li { margin-bottom: 0.4rem; }
        .modal-large .modal-close {
            position: sticky;
            top: 1rem;
            float: right;
            margin: 1rem 1rem 0 0;
            z-index: 10;
        }
    </style>
</head>
<body>
    <header class="blog-hero">
        <div>
            <h1>Le blog de Sancéa Vet</h1>
            <p>Articles, conseils et actualités pour aider vos animaux à rester en bonne santé.</p>
            <a href="index.html" class="btn btn-secondary">← Retour à l'accueil</a>
        </div>
    </header>

    <main class="container">
        <section class="blog" id="actualites">
            <div class="section-header fade-in">
                <h2 id="blogTitle">Actualités & Conseils</h2>
                <p>Retrouvez tous les articles santé, conseils et actualités de la clinique.</p>
            </div>
            <div class="blog-grid" id="blogGrid"></div>
            <div id="articleContainer"></div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <p>© 2026 Sancéa Vet. Tous droits réservés.</p>
        </div>
    </footer>

    <!-- Modal article -->
    <div id="articleModal" class="modal-overlay" onclick="closeArticleModal(event)">
        <div class="modal-content modal-large">
            <button class="modal-close" onclick="closeArticleModal({target:this.parentNode.parentNode,currentTarget:this.parentNode.parentNode})">✕</button>
            <div class="article-modal-img-wrapper">
                <img id="articleModalImg" src="" alt="">
            </div>
            <div class="modal-body">
                <div class="blog-meta" style="margin-bottom:0.5rem;">
                    <span class="category" id="articleModalCategory"></span>
                    <span id="articleModalDate"></span>
                </div>
                <h2 id="articleModalTitle" style="margin:0.5rem 0 1rem;font-size:1.6rem;line-height:1.3;"></h2>
                <p id="articleModalExcerpt" style="font-style:italic;color:#555;margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid #eee;"></p>
                <div id="articleModalBody" style="font-size:1rem;line-height:1.8;color:#333;"></div>
                <p id="articleModalReadTime" style="margin-top:1.5rem;font-size:0.85rem;color:#999;"></p>
                <div id="articleModalShare"></div>
            </div>
        </div>
    </div>

    <script src="assets/js/blog.js"></script>
    <script>
        function closeArticleModal(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('articleModal').classList.remove('active');
            document.body.style.overflow = '';
        }
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeArticleModal();
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
    </script>
</body>
</html>
